name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://relay-server-hiroku.onrender.com
          echo "Server pinged!"
